services:
  db:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_DB: hello_happy
      POSTGRES_USER: hello_happy
      POSTGRES_PASSWORD: "123"
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hello_happy -d hello_happy"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: registry.access.redhat.com/ubi9/openjdk-17:latest
    command: sleep infinity
    working_dir: /workspaces/hello-happy
    user: "0"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/hello_happy
      SPRING_DATASOURCE_USERNAME: hello_happy
      SPRING_DATASOURCE_PASSWORD: "123"
      HOME: /root
    ports:
      - "8080:8080"
    volumes:
      - .:/workspaces/hello-happy:z
      - maven-cache:/root/.m2
    depends_on:
      - db

  frontend:
    image: registry.access.redhat.com/ubi9/nodejs-22:latest
    command: sleep infinity
    working_dir: /workspaces/hello-happy
    user: "0"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
      HOME: /root
    ports:
      - "5173:5173"
    volumes:
      - .:/workspaces/hello-happy:z
      - npm-cache:/root/.npm

volumes:
  postgres-data:
  maven-cache:
  npm-cache:
